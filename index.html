<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Innova Group</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #64748b;
      --line: #dbe3ef;
      --blue: #2563eb;
      --green: #16a34a;
      --amber: #d97706;
      --violet: #7c3aed;
      --bg: #f6f8fb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
    }

    main {
      width: min(760px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, .08);
      padding: 28px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 24px;
    }

    a {
      display: block;
      min-height: 98px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      background: #fff;
    }

    a:hover {
      border-color: currentColor;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .08);
    }

    strong {
      display: block;
      margin-bottom: 7px;
      font-size: 16px;
    }

    span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .admin { color: var(--blue); }
    .booking { color: var(--green); }
    .staff { color: var(--amber); }
    .survey { color: var(--violet); }

    @media (max-width: 620px) {
      main { padding: 22px; }
      .links { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Innova Group</h1>
    <p>Select the page you want to open.</p>

    <div class="links">
      <a class="admin" href="innova-index.html">
        <strong>Admin Dashboard</strong>
        <span>Bookings, stock, clients, delivery, invoices, and settings.</span>
      </a>
      <a class="booking" href="innova-booking.html">
        <strong>Customer Booking</strong>
        <span>Public booking flow for customers.</span>
      </a>
      <a class="staff" href="innova-staff-book.html">
        <strong>Staff Booking</strong>
        <span>Internal booking form for signed-in staff.</span>
      </a>
      <a class="survey" href="innova-survey.html">
        <strong>Survey Page</strong>
        <span>Customer feedback form.</span>
      </a>
    </div>
  </main>
</body>
</html>
